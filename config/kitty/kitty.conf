# --- Fonts ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- Window Style ---
confirm_os_window_close 0
background_opacity      0.85
window_padding_width    10
scrollback_lines        10000
enable_audio_bell       no

# Match your monitor's 144Hz refresh rate for zero tearing
fps_limit 144

# Reduce input latency (lower is faster, but 0 can be buggy)
input_delay 3

# Disable the blink to save a tiny bit of CPU/GPU cycle
cursor_blink_interval 0

# Use the GPU more aggressively for rendering
repaint_delay 10

# Smooth out the scrollback
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 5.0

# Hide the mouse cursor immediately when typing
mouse_hide_wait 3.0

# Secret sauce
shell_integration enabled

# Use Alt for Kitty-specific binds to stay out of Super's way
map alt+enter new_window
map alt+w close_window
map alt+] next_window
map alt+[ previous_window

# Move between tabs
map alt+right next_tab
map alt+left previous_tab

# Open URLs in browser
map alt+e open_url_with_hints

# --- Kitty Hints (The Alt Way) ---

# 1. URLS: Open links in Firefox
map alt+e open_url_with_hints

# 2. WORDS: Copy a single word to clipboard
map alt+w kitten hints --type word --program @

# 3. LINES: Copy a whole line to clipboard
map alt+l kitten hints --type line --program @

# 4. PATHS: Copy a file path (e.g. /etc/nixos/flake.nix) to clipboard
map alt+p kitten hints --type path --program @

# 5. EDIT: Pick a filename on screen and open it in Neovim
map alt+n kitten hints --type path --program nvim

# 6. HASHES: Copy a Git or Nix hash
map alt+h kitten hints --type hash --program @

# 7. MULTI-SELECT: Hold Shift while picking labels to copy multiple items!

# Clipboard
map alt+c copy_to_clipboard
map alt+v paste_from_clipboard

