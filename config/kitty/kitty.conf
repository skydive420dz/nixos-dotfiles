# --- Fonts ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Theme is generated from config/theme/tokens.nix by Home Manager.
include theme

# --- Window Style ---
confirm_os_window_close 0
background_opacity      0.85
window_padding_width    10
scrollback_lines        10000
enable_audio_bell       no
tab_bar_style powerline
tab_powerline_style round
tab_bar_edge top
tab_title_template "{index} {title}"
cursor_trail 10

# Match your monitor's 144Hz refresh rate for zero tearing
fps_limit 144

# Reduce input latency (lower is faster, but 0 can be buggy)
input_delay 3

# Disable the blink to save a tiny bit of CPU/GPU cycle
cursor_blink_interval 0

# Use the GPU more aggressively for rendering
repaint_delay 10

# Smooth out the scrollback
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 5.0

# Hide the mouse cursor immediately when typing
mouse_hide_wait 3.0

# Secret sauce
# This prevents programs from changing the window title
shell_integration enabled
allow_remote_control yes
# Set a fixed title
title Terminal

# Use Alt for Kitty-specific binds to stay out of Super's way.
# Keep Alt+h/j/k/l free for smart-splits resize keys inside Neovim.
map alt+enter new_window
map alt+w close_window
map alt+] next_window
map alt+[ previous_window

# Move between tabs
map alt+right next_tab
map alt+left previous_tab

# 1. URLS: Open links in Firefox
map alt+e open_url_with_hints

# 2. WORDS: Copy a single word to clipboard
map alt+y kitten hints --type word --program @

# 3. PATHS: Copy a file path (e.g. /etc/nixos/flake.nix) to clipboard
map alt+p kitten hints --type path --program @

# 4. EDIT: Pick a filename on screen and open it in Neovim
map alt+n kitten hints --type path --program nvim

# 5. MULTI-SELECT: Hold Shift while picking labels to copy multiple items!

# Clipboard
map alt+c copy_to_clipboard
map alt+v paste_from_clipboard

# Clear the last command output, like Kitty's macOS Cmd+L binding.
map ctrl+shift+l clear_terminal last_command active
