# =========================================
# TMUX CONFIG
# =========================================

# =========================================
# PREFIX / GENERAL
# =========================================

# Use Ctrl+a instead of Ctrl+b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start indexing at 1
set -g base-index 1
setw -g pane-base-index 1

# Faster escape handling
set -sg escape-time 0

# Vim keybindings in copy mode
setw -g mode-keys vi

# Enable mouse
set -g mouse on

# Huge scrollback
set -g history-limit 100000

# =========================================
# TERMINAL / COLORS
# =========================================

# Proper Kitty + truecolor support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# =========================================
# STATUS BAR
# =========================================

set -g status-position top
set -g status-interval 5

# Catppuccin Mocha colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Length
set -g status-left-length 100
set -g status-right-length 100

# Remove default window list
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# ----- LEFT SIDE -----

set -g status-left "#[fg=#cba6f7,bg=#1e1e2e]#[fg=#1e1e2e,bg=#cba6f7] #S #[fg=#cba6f7,bg=#1e1e2e] #[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa] #{b:pane_current_path} #[fg=#89b4fa,bg=#1e1e2e]"

# ----- RIGHT SIDE -----

set -g status-right "#[fg=#a6e3a1,bg=#1e1e2e]#[fg=#1e1e2e,bg=#a6e3a1] #{user} #[fg=#a6e3a1,bg=#1e1e2e] #[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa] #H #[fg=#89b4fa,bg=#1e1e2e] #[fg=#f9e2af,bg=#1e1e2e]#[fg=#1e1e2e,bg=#f9e2af] %H:%M #[fg=#f9e2af,bg=#1e1e2e]"

# =========================================
# PANE BORDERS
# =========================================

set -g pane-border-style fg=#45475a
set -g pane-active-border-style fg=#89b4fa

# =========================================
# SPLITS
# =========================================

# Split while keeping current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# =========================================
# PANE NAVIGATION
# =========================================

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# =========================================
# PANE RESIZING
# =========================================

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =========================================
# COPY MODE
# =========================================

# Enter copy mode
bind [ copy-mode

# Vim-style selection
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Yank selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =========================================
# WINDOW NAMES
# =========================================

# Automatically rename windows to current folder
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# =========================================
# RELOAD CONFIG
# =========================================

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
# -----------------------------
# tmux-resurrect
# -----------------------------

# Save sessions automatically
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @plugin 'tmux-plugins/tmux-resurrect'
