# ============================================
# AERC ACCOUNTS — Gmail, Outlook, iCloud
# ============================================
# This file holds account credentials. Keep it readable only by your user:
#   chmod 600 ~/.config/aerc/accounts.conf
#
# Three accounts configured below using app passwords (the simplest setup
# that works for all three providers without OAuth dances).
#
# ── How to get app passwords ─────────────────────────────────────────────────
#
# GMAIL
#   1. Enable 2-Step Verification: https://myaccount.google.com/security
#   2. Go to: https://myaccount.google.com/apppasswords
#   3. App: "Mail", Device: "aerc" → Generate
#   4. Copy the 16-char password (no spaces). Use it as `password` below.
#
# OUTLOOK / MICROSOFT 365
#   1. Enable 2-Step Verification: https://account.microsoft.com/security
#   2. Go to: https://account.microsoft.com/security → Advanced security
#      options → "App passwords"
#   3. Create new app password. Copy and use below.
#   NOTE: Some Microsoft 365 tenants disable app passwords. If yours does,
#   you'll need OAuth (see comments at bottom of file).
#
# ICLOUD / APPLE ID
#   1. Sign into https://appleid.apple.com
#   2. Sign-In and Security → App-Specific Passwords → Generate
#   3. Label "aerc", copy the password (format: xxxx-xxxx-xxxx-xxxx — keep
#      the dashes when pasting).
#
# ── Recommended: encrypt with pass ───────────────────────────────────────────
# Instead of putting raw passwords here:
#   pass insert email/gmail
#   pass insert email/outlook
#   pass insert email/icloud
# Then change `password = ...` lines to:
#   source-cred-cmd = pass email/gmail
# This avoids a plain-text password file. Same idea for outgoing-cred-cmd.
#
# ─────────────────────────────────────────────────────────────────────────────


[Gmail]
source             = imaps://your.email%40gmail.com@imap.gmail.com:993
outgoing           = smtps://your.email%40gmail.com@smtp.gmail.com:465
source-cred-cmd    = pass email/gmail
outgoing-cred-cmd  = pass email/gmail
default            = INBOX
from              = Your Name <your.email@gmail.com>
copy-to            = "[Gmail]/Sent Mail"
postpone           = "[Gmail]/Drafts"
cache-headers      = true
folders-sort       = INBOX,"[Gmail]/Sent Mail","[Gmail]/Drafts","[Gmail]/All Mail","[Gmail]/Trash","[Gmail]/Spam"
# Enable one of these:
# password         = your-16-char-app-password-here
# source-cred-cmd  = pass email/gmail
# outgoing-cred-cmd = pass email/gmail


[Outlook]
source             = imaps://your.email%40outlook.com@outlook.office365.com:993
outgoing           = smtps://your.email%40outlook.com@smtp.office365.com:587
source-cred-cmd    = pass email/outlook
outgoing-cred-cmd  = pass email/outlook
default            = INBOX
from              = Your Name <your.email@outlook.com>
copy-to            = "Sent Items"
postpone           = "Drafts"
cache-headers      = true
# Enable one:
# password         = your-app-password
# source-cred-cmd  = pass email/outlook


[iCloud]
source             = imaps://your.email%40icloud.com@imap.mail.me.com:993
outgoing           = smtps://your.email%40icloud.com@smtp.mail.me.com:587
source-cred-cmd    = pass email/icloud
outgoing-cred-cmd  = pass email/icloud
default            = INBOX
from              = Your Name <your.email@icloud.com>
copy-to            = "Sent Messages"
postpone           = "Drafts"
cache-headers      = true
# iCloud app password format includes dashes — keep them.
# password         = xxxx-xxxx-xxxx-xxxx
# source-cred-cmd  = pass email/icloud
# outgoing-cred-cmd = pass email/icloud


# ── URL ENCODING NOTE ────────────────────────────────────────────────────────
# The @ in your email address must be encoded as %40 in source/outgoing URLs.
# Examples:
#   alice@gmail.com  →  alice%40gmail.com
#   bob.smith@outlook.com  →  bob.smith%40outlook.com
# Other characters that need encoding: : → %3A, / → %2F, ? → %3F, # → %23
# Most usernames don't need anything beyond %40 for the @.

# ── OAUTH (Gmail) — IF APP PASSWORDS DON'T WORK FOR YOU ─────────────────────
# If your organization disables app passwords, you'll need OAuth. The setup
# is genuinely painful (Google Cloud project, consent screen, refresh token
# generation). The aerc-imap(5) man page covers it. Skeleton:
#
# [Gmail-OAuth]
# source = imaps+oauthbearer://you%40gmail.com:REFRESH_TOKEN@imap.gmail.com:993?token_endpoint=https%3A%2F%2Foauth2.googleapis.com%2Ftoken&client_id=YOUR_ID&client_secret=YOUR_SECRET
# outgoing = smtps+oauthbearer://you%40gmail.com:REFRESH_TOKEN@smtp.gmail.com:465?token_endpoint=https%3A%2F%2Foauth2.googleapis.com%2Ftoken&client_id=YOUR_ID&client_secret=YOUR_SECRET
#
# Use app passwords first. Switch to OAuth only if you must.
