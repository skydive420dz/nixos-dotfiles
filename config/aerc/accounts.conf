# ============================================
# AERC ACCOUNTS — Gmail, Hotmail, iCloud
# ============================================
# Credentials handled via `pass` (passwordstore.org). Account passwords
# are NOT in this file — only references like `pass email/gmail`.
# Safe to commit to git.
#
# To add/rotate a password:
#   pass insert email/<account-name>      # creates/replaces entry
#   pass email/<account-name> | wc -c     # verify byte count is 17 for Gmail/Hotmail, 20 for iCloud
#
# ── App password sources ──────────────────────────────────────────────────
#   Gmail:    https://myaccount.google.com/apppasswords  (requires 2FA)
#   Hotmail:  https://account.live.com/proofs/AppPassword
#   iCloud:   https://appleid.apple.com → App-Specific Passwords
# ─────────────────────────────────────────────────────────────────────────


[Gmail]
source             = imaps://ra.lucas.ro%40gmail.com@imap.gmail.com:993
outgoing           = smtps://ra.lucas.ro%40gmail.com@smtp.gmail.com:465
source-cred-cmd    = pass email/gmail
outgoing-cred-cmd  = pass email/gmail
default            = INBOX
from               = Rafael Oliveira <ra.lucas.ro@gmail.com>
copy-to            = "[Gmail]/Sent Mail"
postpone           = "[Gmail]/Drafts"
cache-headers      = true
folders-sort       = INBOX,"[Gmail]/Sent Mail","[Gmail]/Drafts","[Gmail]/Spam","[Gmail]/All Mail","[Gmail]/Trash"


