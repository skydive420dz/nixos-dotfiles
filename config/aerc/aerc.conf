# ============================================
# AERC MAIN CONFIG
# ============================================
# Reload in-app: :reload-config
# Documentation: man aerc-config

[general]
# Pretty pwbar at the bottom showing accounts and unread counts
pgp-provider                 = gpg
unsafe-accounts-conf         = false
default-save-path            = ~/Downloads
log-file = ~/.cache/aerc.log
log-level = debug

[ui]
stylesets-dirs                = ~/.config/theme/current/aerc/stylesets:~/.config/aerc/stylesets
index-format                 = %-20.20D %-17.17n %Z %s
timestamp-format             = 2006-01-02 15:04
this-day-time-format         = 15:04
this-week-time-format        = Mon 15:04
this-year-time-format        = 02 Jan
message-view-timestamp-format = 2006-01-02 15:04 (-0700)

# Sidebar
sidebar-width                = 22
empty-message                = (No mail to display.)
empty-dirlist                = (No folders.)

# Tabs
tab-title-account            = {{.Account}}
tab-title-composer           = {{if .Subject}}{{.Subject}}{{else}}New email{{end}}
spinner                      = "[ ⡿ ],[ ⣟ ],[ ⣯ ],[ ⣷ ],[ ⣾ ],[ ⣽ ],[ ⣻ ],[ ⢿ ]"
spinner-delimiter            = ","

# Threading
threading-enabled            = true
sort                         = -r date
client-threads-delay         = 50ms
new-message-bell             = false

# Markdown rendering for plain-text mail (where applicable)
icon-unencrypted             = ""
icon-encrypted               = "[e]"
icon-signed                  = "[s]"
icon-signed-encrypted        = "[se]"
icon-unknown                 = "[?]"
icon-invalid                 = "[!]"

# Mouse support — enable for mouse fallback
mouse-enabled                = true

# Use system clipboard (uses wl-copy on Wayland)
fuzzy-complete               = true

[viewer]
# Render HTML emails: pipe through w3m for readability
pager                        = less -R
alternatives                 = text/plain,text/html
header-layout                = From|To,Cc|Bcc,Date,Subject
show-headers                 = false
always-show-mime             = false
parse-http-links             = true

[compose]
# External editor: drop into nvim through your terminal setup.
editor                       = nvim
header-layout                = To|From,Subject
address-book-cmd             = ""
file-picker-cmd              = "yazi --chooser-file=%f"
edit-headers                 = false
no-attachment-warning        = "^[^>]*attach(ed|ment)"

[filters]
# Display filters: how content of each MIME type is rendered in the message view.
# These ship with aerc — paths below are typical Nix store locations resolved
# automatically via the wrapper. Adjust if a filter is missing.
text/plain                   = colorize
text/calendar                = calendar
message/delivery-status      = colorize
message/rfc822               = colorize
text/html                    = html | colorize
# Image previews via chafa if you have it (sixel-capable terminals like kitty):
image/*                      = chafa --format=symbols --symbols=block --colors=240 --color-space=rgb --dither=ordered --size=80x25
application/x-sh             = colorize
application/pdf              = pdftotext - - | colorize

[hooks]
# Run a command when new mail arrives. Disable if it's annoying.
mail-received                = notify-send "New mail" "$AERC_FROM_NAME <$AERC_FROM_ADDRESS>: $AERC_SUBJECT"

[templates]
# Template directories (defaults, just here for documentation)
template-dirs                = /usr/share/aerc/templates:~/.config/aerc/templates
new-message                  = new_message
quoted-reply                 = quoted_reply
forwards                     = forward_as_body

[statusline]
status-columns               = left<*,center>=,right>*
column-left                  = [{{.Account}}] {{.StatusInfo}}
column-center                = {{.PendingKeys}}
column-right                 = {{.TrayInfo}} | {{cwd}}
separator                    = " "
display-mode                 = ""

[ui]
styleset-name                = sky
