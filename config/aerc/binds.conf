# ============================================
# AERC KEYBINDINGS
# ============================================
# Reload in-app: :reload-config
# Format: command = bound-keys
# Multi-key bindings use sequential keys (like vim).
# Documentation: man aerc-binds

[messages]
# Navigation
q             = :prompt 'Quit?' quit<Enter>
<C-c>         = :prompt 'Quit?' quit<Enter>

j             = :next<Enter>
<Down>        = :next<Enter>
k             = :prev<Enter>
<Up>          = :prev<Enter>
g             = :select 0<Enter>
G             = :select -1<Enter>
<C-d>         = :next 50%<Enter>
<C-u>         = :prev 50%<Enter>
<C-f>         = :next 100%<Enter>
<C-b>         = :prev 100%<Enter>

# Folder/account switching
J             = :next-folder<Enter>
K             = :prev-folder<Enter>
H             = :collapse-folder<Enter>
L             = :expand-folder<Enter>
<C-l>         = :next-tab<Enter>
<C-h>         = :prev-tab<Enter>
<C-n>         = :next-account<Enter>
<C-p>         = :prev-account<Enter>

# Compose / reply / forward
c             = :compose<Enter>
rr            = :reply -a<Enter>
rq            = :reply -aq<Enter>
Rr            = :reply<Enter>
Rq            = :reply -q<Enter>
f             = :forward<Enter>

# Read / mark
<Enter>       = :view<Enter>
<Space>       = :mark -t<Enter>:next<Enter>
<Tab>         = :mark -t<Enter>
$             = :mark -V<Enter>
*             = :mark -a<Enter>
<C-Space>     = :mark -T<Enter>
ms            = :mark -t<Enter>:flag<Enter>:mark -t<Enter>
mr            = :mark -t<Enter>:flag --read<Enter>:mark -t<Enter>
mu            = :mark -t<Enter>:flag --read --toggle<Enter>:mark -t<Enter>

# Delete / archive / move
D             = :move Trash<Enter>
A             = :archive flat<Enter>
M             = :move<space>

# ── Spam / Junk handling ─────────────────────────────────────────────────
# Move to spam — leaves the cursor on the move prompt with `:move ` so you
# can tab-complete the right folder name (different per provider):
#   Gmail   → [Gmail]/Spam
#   Hotmail → Junk Email
#   iCloud  → Junk
# Tab-completion makes this fast: type `S` then start typing 'Sp' or 'Ju'.
S             = :move<space>

# Quick "this is not spam" — back to Inbox. Same tab-complete trick:
# from spam folder, type 'I' + Tab to land on INBOX/Inbox.
U             = :move<space>

# Search / filter
/             = :search<space>
\             = :filter<space>
n             = :next-result<Enter>
N             = :prev-result<Enter>
<Esc>         = :clear<Enter>

# Refresh
<C-r>         = :check-mail<Enter>

# Sort
T             = :toggle-threads<Enter>

[view]
# Inside an opened message
q             = :close<Enter>
<C-c>         = :close<Enter>
J             = :next<Enter>
K             = :prev<Enter>
o             = :open<Enter>
s             = :save<space>
|             = :pipe<space>
D             = :delete<Enter>
A             = :archive flat<Enter>
S             = :move<space>
f             = :forward<Enter>
rr            = :reply -a<Enter>
rq            = :reply -aq<Enter>
Rr            = :reply<Enter>
Rq            = :reply -q<Enter>

# Open URLs in qutebrowser via hyperlink picker
<C-l>         = :open-link<space>
H             = :toggle-headers<Enter>

# Switch alternative MIME parts (for HTML/plain)
<C-k>         = :prev-part<Enter>
<C-j>         = :next-part<Enter>

[view::passthrough]
# Pass-through mode for interactive content (e.g. browsing rendered HTML)
$noinherit    = true
<Esc>         = :toggle-key-passthrough<Enter>

[compose]
$noinherit    = true
$ex           = <C-x>
<C-k>         = :prev-field<Enter>
<C-j>         = :next-field<Enter>
<tab>         = :next-field<Enter>
<backtab>     = :prev-field<Enter>
<C-p>         = :prev-tab<Enter>
<C-n>         = :next-tab<Enter>

[compose::editor]
$noinherit    = true
$ex           = <C-x>
<C-k>         = :prev-field<Enter>
<C-j>         = :next-field<Enter>
<C-p>         = :prev-tab<Enter>
<C-n>         = :next-tab<Enter>

[compose::review]
y             = :send<Enter>
n             = :abort<Enter>
v             = :preview<Enter>
p             = :postpone<Enter>
q             = :choose -o d discard abort -o p postpone postpone<Enter>
e             = :edit<Enter>
a             = :attach<space>
d             = :detach<space>

[terminal]
$noinherit    = true
$ex           = <C-x>
<C-p>         = :prev-tab<Enter>
<C-n>         = :next-tab<Enter>
