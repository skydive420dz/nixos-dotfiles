###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# --- Program Variables ---
# Use 'uwsm app --' for apps to track them in systemd
$terminal = uwsm app -- kitty
$fileManager = uwsm app -- kitty -e yazi
$browser = uwsm app -- firefox
$menu = pkill rofi || uwsm app -- rofi -show drun

# For scripts/tools that close immediately, 'uwsm app' isn't always needed but doesn't hurt
$snip = snip

# Since Waybar is now a systemd service, we use systemctl to reload it!
# This is much cleaner than pkill.
$reload_waybar = systemctl --user restart waybar


#################
### AUTOSTART ###
#################

# Set the wallpaper (using the same paths as before)
exec-once = uwsm app -- awww img ~/Downloads/icegif-162.gif

# Only keep one-time environment setup or non-service apps
exec-once = uwsm app -- nm-applet --indicator
exec-once = uwsm app -- blueman-applet


#####################
### LOOK AND FEEL ###
#####################

## Refer to https://wiki.hyprland.org/Configuring/Variables/
#hl.workspace_rule({ workspace = "w[tv1]", gaps_out = 0, gaps_in = 0 })
#hl.workspace_rule({ workspace = "f[1]", gaps_out = 0, gaps_in = 0 })
#hl.window_rule({ match = { float = false, workspace = "w[tv1]" }, border_size = 0 })
#hl.window_rule({ match = { float = false, workspace = "w[tv1]" }, rounding = 0 })
#hl.window_rule({ match = { float = false, workspace = "f[1]" }, border_size = 0 })
#hl.window_rule({ match = { float = false, workspace = "f[1]" }, rounding = 0 })

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 8
    gaps_out = 16
    resize_on_border = false
    allow_tearing = false
    border_size = 0

    layout = dwindle
}


# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 15
    rounding_power = 10
    active_opacity = 1.0
    inactive_opacity = 0.80

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 15
        passes = 4
        noise = 0.01
        contrast = 0.8
        vibrancy = 0.1696
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = $surface1
        color_inactive=$surface1
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

# Bezier curves
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1.0, 0.5, 1.0
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = softSnap, 0.4, 0, 0.2, 1.0
    bezier = fluent, 0.0, 0.0, 0.2, 1.0

# Windows
    animation = windows, 1, 5, overshot, popin 80%
    animation = windowsIn, 1, 5, overshot, popin 80%
    animation = windowsOut, 1, 4, smoothOut, popin 95%
    animation = windowsMove, 1, 4, softSnap

# Layers
    animation = layersIn, 1, 3, smoothIn, slide right
    animation = layersOut, 1, 2, softSnap, slide right

# Fade
    animation = fade, 1, 4, smoothIn
    animation = fadeIn, 1, 4, smoothIn
    animation = fadeOut, 1, 4, smoothOut
    animation = fadeSwitch, 1, 4, smoothIn
    animation = fadeShadow, 1, 4, smoothIn
    animation = fadeDim, 1, 4, smoothIn
    animation = fadeDpms, 1, 4, smoothIn

# Workspaces
    animation = workspaces, 1, 5, overshot, slidefade 30%
    animation = specialWorkspace, 1, 5, overshot, slidefadevert 30%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    #xset r rate 200 35
    repeat_rate = 35
    repeat_delay = 200


    touchpad {
        natural_scroll = true 
    }
}

cursor {
    inactive_timeout = 30
    no_hardware_cursors = true
}


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, uwsm stop
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, R, exec, $reload_waybar
bind = $mainMod, S, exec, $snip
bind = $mainMod, W, exec, $browser
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute -l 1.5 @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
# Move focus with mainMod + arrow keys
bind = $mainMod, l, movefocus, l
bind = $mainMod, h, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- Multimedia & Video ---
windowrule {
    name = multimedia_opaque
    match:tag = multimedia_video
    no_blur = on
    opacity = 1.0
}

# --- Global Window Behavior ---
windowrule {
    name = global_behavior
    match:class = ^.*$
    suppress_event = maximize
    idle_inhibit = fullscreen
}

# --- Floating File Pickers & Dialogs ---
windowrule {
    name = floating_pickers
    match:title = ^(.*Open File.*|.*Open Folder.*|.*Open.*|.*Save.*|.*Save As.*|.*Export.*|.*Import.*|.*Choose File.*|.*Rename.*|.*script-fu.*)$
    match:class = ^(.*xdg-desktop-portal-gtk.*|.*xdg-desktop-portal-hyprland.*)$
    match:title = ^(.*Authentication Required.*)$
    size = 800 450
    float = on
    center = on
}

# --- Steam Rules ---
windowrule {
    name = steam_friends
    match:class = ^Steam$
    match:title = ^(Friends List)$
    float = on
    size = 300 600
}

# --- Monitoring Tools ---
windowrule {
    name = nvtop_float
    match:title = ^(nvtop_float)$
    float = on
    size = 800 450
    center = on
    opacity = 0.85 0.85
}

windowrule {
    name = btop_float
    match:title = ^(btop_float)$
    float = on
    size = 1000 600
    center = on
}

# --- Layer Rules (Fixed with 'name' for v0.53+) ---
layerrule {
    name = waybar_glass
    match:namespace = ^waybar$
    blur = on
    ignore_alpha = 0.7
}

layerrule {
    name = rofi_glass
    match:namespace = ^rofi$
    blur = on
    ignore_alpha = 0.5
}

layerrule {
    name = notification_glass
    match:namespace = ^notifications$
    blur = on
    ignore_alpha = 0.5
}
windowrule {
    name = Friends List
    match:class = ^Steam$
    match:title = ^(Friends List)$
    float = on
    size =  450 800
    center = on
}



# --- Monitoring Tools ---
