###################
### MY PROGRAMS ###
###################

$terminal     = uwsm app -- kitty
$fileManager  = uwsm app -- kitty -e yazi
$browser      = uwsm app -- firefox
$menu         = ~/.config/scripts/launcher-toggle
$snip         = grimblast copy area   # select region → clipboard
# or
#$snip = grimblast save area ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
$reload_shell = systemctl --user restart quickshell


#################
### AUTOSTART ###
#################

exec-once = uwsm app -- awww img --output eDP-1 ~/Pictures/nasa-hubble-space-telescope-17hchodU6sA-unsplash.jpg --transition-type fade
exec-once = uwsm app -- awww img --output HDMI-A-1 ~/Pictures/wp12215877.jpg
exec-once = uwsm app -- vesktop -m

# Background: watch clipboard, store history
exec-once = uwsm app -- wl-paste --type text  --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# Keep clipboard contents alive after source app closes:
exec-once = uwsm app -- wl-clip-persist --clipboard regular

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in          = 4
    gaps_out         = 8
    border_size      = 0
    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 15
    rounding_power = 10
    active_opacity   = 1.0
    inactive_opacity = 0.80

    blur {
        enabled           = true
        size              = 7
        passes            = 2
        noise             = 0.01
        contrast          = 0.8
        vibrancy          = 0.1696
        new_optimizations = true
        ignore_opacity    = true
    }

    shadow {
        enabled        = true
        range          = 16
        render_power   = 3
        color          = $surface1
        color_inactive = $surface1
    }
}

animations {
    enabled = true

    # Bezier curves
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn,  0.25, 1.0, 0.5, 1.0
    bezier = overshot,  0.05, 0.9, 0.1, 1.05
    bezier = softSnap,  0.4, 0, 0.2, 1.0
    bezier = fluent,    0.0, 0.0, 0.2, 1.0

    # Windows
    animation = windows,     1, 5, overshot, popin 80%
    animation = windowsIn,   1, 5, overshot, popin 80%
    animation = windowsOut,  1, 4, smoothOut, popin 95%
    animation = windowsMove, 1, 4, softSnap

    # Layers
    animation = layersIn,  1, 3, smoothIn, slide right
    animation = layersOut, 1, 2, softSnap, slide right

    # Fade
    animation = fade,        1, 4, smoothIn
    animation = fadeIn,      1, 4, smoothIn
    animation = fadeOut,     1, 4, smoothOut
    animation = fadeSwitch,  1, 4, smoothIn
    animation = fadeShadow,  1, 4, smoothIn
    animation = fadeDim,     1, 4, smoothIn
    animation = fadeDpms,    1, 4, smoothIn

    # Workspaces
    animation = workspaces,       1, 5, overshot, slidefade 30%
    animation = specialWorkspace, 1, 5, overshot, slidefadevert 30%
}

dwindle {
    pseudotile    = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0  # 0 = disable anime mascot
    disable_hyprland_logo   = true
}


#############
### INPUT ###
#############

input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0

    repeat_rate  = 35
    repeat_delay = 200

    touchpad {
        natural_scroll = true
    }
}

cursor {
    inactive_timeout   = 30
    no_hardware_cursors = true
}


####################
### KEYBINDINGS  ###
####################

$mainMod = CTRL ALT

# Apps
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       W,      exec, $browser
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       SPACE,  exec, $menu
bind = $mainMod,       S,      exec, $snip
bind = $mainMod,       R,      exec, $reload_shell
bind = $mainMod,       Q,      killactive
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       M,      exec, uwsm stop
bind = $mainMod SHIFT, D,      exec, kitty --title tmux_main tmux new -A -s dots

# Focus (vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse workspace scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Set Fullscreen
bind = $mainMod,       F, fullscreen, 1   # maximize (shell visible)
bind = $mainMod SHIFT, F, fullscreen, 0   # true fullscreen (shell hidden)

# Volume / Brightness OSD
bindle = , XF86AudioRaiseVolume,  exec, ~/.config/scripts/osd-volume up
bindle = , XF86AudioLowerVolume,  exec, ~/.config/scripts/osd-volume down
bindl  = , XF86AudioMute,         exec, ~/.config/scripts/osd-volume mute
bindl  = , XF86AudioMicMute,      exec, ~/.config/scripts/osd-mic

bindle = , XF86MonBrightnessUp,   exec, ~/.config/scripts/osd-brightness up
bindle = , XF86MonBrightnessDown, exec, ~/.config/scripts/osd-brightness down


##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- Multimedia (opaque, no blur for video) ---
windowrule {
    name      = multimedia_opaque
    match:tag = multimedia_video
    no_blur   = on
    opacity   = 1.0
}

# --- Global defaults ---
windowrule {
    name           = global_behavior
    match:class    = ^.*$
    suppress_event = maximize
    idle_inhibit   = fullscreen
}

# --- File pickers and dialogs ---
windowrule {
    name        = floating_pickers
    match:title = ^(.*Open File.*|.*Open Folder.*|.*Open.*|.*Save.*|.*Save As.*|.*Export.*|.*Import.*|.*Choose File.*|.*Rename.*|.*script-fu.*|.*Authentication Required.*)$
    match:class = ^(.*xdg-desktop-portal-gtk.*|.*xdg-desktop-portal-hyprland.*)$
    size        = 800 450
    float       = on
    center      = on
}

# --- Steam Friends List ---
windowrule {
    name        = steam_friends
    match:class = ^Steam$
    match:title = ^(Friends List)$
    float       = on
    size        = 450 800
    center      = on
}

# --- Monitoring tools ---
windowrule {
    name        = nvtop_float
    match:title = ^(nvtop_float)$
    float       = on
    size        = 1000 600
    center      = on
    opacity     = 0.85 0.85
}

windowrule {
    name        = btop_float
    match:title = ^(btop_float)$
    float       = on
    size        = 1000 600
    center      = on
}

# --- Applets (bluetooth, wifi, audio) ---
windowrule {
    name        = bluetooth_applet
    match:class = ^(bluetui)$
    float       = on
    size        = 600 600
    center      = on
    opacity     = 1.0
}

windowrule {
    name        = wifi_applet
    match:class = ^(nmtui)$
    float       = on
    size        = 600 600
    center      = on
    opacity     = 1.0
}

windowrule {
    name        = sound_applet
    match:class = ^(wiremix)$
    float       = on
    size        = 700 500
    center      = on
    opacity     = 1.0
}


##############################
### LAYER RULES            ###
##############################
layerrule {
    name = qs_bar_blur
    match:namespace = ^qs-bar$
    blur = on
    ignore_alpha = 0
}
